model = "gpt-5.4"
model_reasoning_effort = "xhigh"
personality = "pragmatic"

# Keep suite_repo_mcp in %USERPROFILE%\.codex\config.toml.
# workstation:sync stamps machine-local env and absolute paths there.

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[features]
js_repl = true
multi_agent = true
rmcp_client = true

[windows]
sandbox = "elevated"
