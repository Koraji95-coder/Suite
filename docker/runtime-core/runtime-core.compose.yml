services:
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - suite_runtime_core_redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ../..
      dockerfile: docker/runtime-core/backend.Dockerfile
    working_dir: /workspace
    env_file:
      - ../../.env
      - ../../.env.local
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 5000
      API_LIMITER_STORAGE_URI: redis://redis:6379/0
      SUPABASE_URL: http://host.docker.internal:${SUITE_SUPABASE_LOCAL_API_PORT:-54321}
    volumes:
      - ../..:/workspace
      - type: bind
        source: ${SUITE_RUNTIME_STATUS_DIR}
        target: /runtime-logs
    command:
      - sh
      - -lc
      - python backend/api_server.py 2>&1 | tee /runtime-logs/backend.log
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: >-
        python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).getcode() < 500 else 1)"
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: ../..
      dockerfile: docker/runtime-core/node.Dockerfile
    working_dir: /workspace
    env_file:
      - ../../.env
      - ../../.env.local
    environment:
      CHOKIDAR_USEPOLLING: "1"
      BACKEND_PROXY_TARGET: http://backend:5000
    volumes:
      - ../..:/workspace
      - suite_runtime_core_node_modules:/workspace/node_modules
      - type: bind
        source: ${SUITE_RUNTIME_STATUS_DIR}
        target: /runtime-logs
    command:
      - sh
      - -lc
      - npm run dev -- --host 0.0.0.0 --port 5173 --strictPort 2>&1 | tee /runtime-logs/frontend.log
    ports:
      - "5173:5173"
    depends_on:
      - backend
    healthcheck:
      test: >-
        node -e "fetch('http://127.0.0.1:5173').then((response)=>process.exit(response.status < 500 ? 0 : 1)).catch(()=>process.exit(1))"
      interval: 20s
      timeout: 15s
      retries: 6
      start_period: 25s

volumes:
  suite_runtime_core_node_modules:
  suite_runtime_core_redis_data:
