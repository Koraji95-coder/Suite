# Legacy reference only. Do not stamp MCP env manually from this file.
# Supported path:
#   PowerShell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/sync-suite-workstation-profile.ps1 -WorkstationId DUSTIN-HOME
# Target config path is %USERPROFILE%\.codex\config.toml.

# ── Suite Repo MCP (custom repo-native server) ──
[mcp_servers.suite_repo_mcp]
command = "node"
args = ["tools/suite-repo-mcp/server.mjs"]

[mcp_servers.suite_repo_mcp.env]
SUITE_MCP_ENV_STAMPED_BY = "scripts/sync-suite-workstation-profile.ps1"
SUITE_WORKSTATION_ID = "DUSTIN-HOME"
SUITE_WORKSTATION_LABEL = "Dustin Home station"
SUITE_WORKSTATION_ROLE = "home"

