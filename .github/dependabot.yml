version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dependabot-updates"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "dependabot-updates"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "pip"
    directory: "/backend/Transmittal-Builder"
    target-branch: "dependabot-updates"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "docker"
    directory: "/docker/runtime-core"
    target-branch: "dependabot-updates"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
