<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suite Operator Shell</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app-shell" class="operator-shell">
    <div class="shell-atmosphere" aria-hidden="true"></div>

    <header class="shell-header">
      <div class="brand-cluster">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="presentation" focusable="false">
            <path d="M14 12h36v9H22v10h20v9H22v12h28v8H14z"></path>
            <path d="M52 12h4v40h-4z" class="brand-trace"></path>
            <path d="M8 20h4v24H8z" class="brand-trace"></path>
          </svg>
        </div>
        <div class="brand-copy">
          <span class="brand-kicker">Suite Operator Shell</span>
          <strong id="workspace-heading">Office Workspace</strong>
          <span id="workspace-subheading">Unified Office and runtime control client.</span>
        </div>
      </div>

      <div class="workspace-switcher" id="workspace-switcher" aria-label="Workspace switcher">
        <button type="button" class="workspace-switch is-active" data-workspace="office">Office</button>
        <button type="button" class="workspace-switch" data-workspace="runtime">Suite Runtime</button>
      </div>

      <div class="header-tools">
        <div class="command-deck">
          <label class="command-field" for="command-input">
            <span class="command-label">Action Search</span>
            <input id="command-input" type="search" autocomplete="off" spellcheck="false" placeholder="Search actions, routes, references, and handoffs">
          </label>
          <div id="command-results" class="command-results hidden"></div>
        </div>

        <div class="header-meta">
          <div class="clock-block">
            <span id="clock-date" class="clock-date">---</span>
            <span id="clock-time" class="clock-time">--:--:--</span>
          </div>
          <div id="overall-status-pill" class="status-pill booting">Booting</div>
          <div id="provider-status-pill" class="status-pill pending">Office</div>
          <div class="header-control-cluster">
            <button id="utility-dock-btn" type="button" class="top-btn" aria-pressed="false">Open Dock</button>
            <div class="header-menu">
              <button id="display-menu-btn" type="button" class="top-btn" aria-haspopup="menu" aria-expanded="false">View</button>
              <div id="display-menu" class="display-menu hidden" role="menu" aria-label="Shell display controls">
                <div class="display-menu-section">
                  <div class="nav-eyebrow">View controls</div>
                  <div id="shell-scale-controls" class="scale-controls display-scale-controls" aria-label="Shell content scale">
                    <span class="scale-label">Content scale</span>
                    <button type="button" class="scale-btn" data-scale-preset="100">100%</button>
                    <button type="button" class="scale-btn" data-scale-preset="110">110%</button>
                    <button type="button" class="scale-btn" data-scale-preset="125">125%</button>
                    <button type="button" class="scale-btn" data-scale-preset="140">140%</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="shell-body">
      <aside class="workspace-nav">
        <section class="nav-section">
          <div class="nav-eyebrow">Workspace</div>
          <div id="workspace-summary" class="nav-summary">Loading shell context.</div>
        </section>

        <section class="nav-section">
          <div class="nav-eyebrow">Views</div>
          <div id="workspace-view-nav" class="view-nav"></div>
        </section>

        <section class="nav-section">
          <div class="nav-eyebrow">Quick Actions</div>
          <div id="workspace-actions" class="nav-actions"></div>
        </section>
      </aside>

      <main class="workspace-stage">
        <section id="hero-panel" class="hero-panel"></section>
        <section id="workspace-content" class="workspace-content"></section>
      </main>

      <aside id="utility-pane" class="utility-pane" aria-label="Operator utility pane">
        <div id="utility-resizer" class="utility-resizer" role="separator" aria-orientation="vertical" aria-label="Resize utility pane"></div>
        <header class="utility-header">
          <div>
            <div class="nav-eyebrow">Utility Dock</div>
            <div id="utility-subtitle" class="drawer-subtitle">Context, logs, and inbox stay docked here.</div>
          </div>
          <div class="utility-tab-row" id="utility-tab-row">
            <button type="button" class="workspace-switch is-active" data-utility-tab="context">Context</button>
            <button type="button" class="workspace-switch" data-utility-tab="logs">Logs</button>
            <button type="button" class="workspace-switch" data-utility-tab="inbox">Inbox</button>
          </div>
        </header>
        <section id="utility-content" class="utility-content"></section>
      </aside>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
