# ══════════════════════════════════════════════════════════
# CODEX CLI EXTRA FLAGS
# Pass these as additional instructions/sandbox hints when
# launching Codex sessions for advanced tasks.
# ══════════════════════════════════════════════════════════
#
# Codex sandbox hints (pass via CLI or CODEX_SANDBOX_INSTRUCTIONS):
#
#   --sandbox-permissions filesystem:write
#   --sandbox-permissions network:local
#
# Codex model hints:
#   codex --model o4-mini       (fast iteration, lint/type tasks)
#   codex --model o3            (complex refactors, architecture)
#
# Codex approval mode:
#   codex --approval-mode full-auto   (trusted repos, CI-like runs)
#   codex --approval-mode suggest     (review-first, safer)
#
# MCP-aware Codex invocation:
#   codex --mcp-config %USERPROFILE%\.codex\config.toml
